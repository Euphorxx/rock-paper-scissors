<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="index.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Lilita+One&display=swap');
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="nav-border">
        <div class="nav-bar">
            <div class="logousername">
                <ul>
                    <li>Rock Paper Scissors!</li>
                    <li><a href="https://github.com/Euphorxx">Euphorxx</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="panels">
        <div class="main-game">
            <img class="human-opt"></img>
            <img class="vs-img" src="images/versus.png"></img>
            <img class="comp-opt"></img>
        </div>
        <div class="mid-panels">
            <div class="scoreboard">
                <ul class="score-titles">
                    <li>Your score</li>
                    <li>Computer score</li>
                </ul>
                <ul class="score-count">
                    <li class="human-count"></li>
                    <li>—</li>
                    <li class="comp-count"></li>
                </ul>
            </div>
            <div class="processing-panel">
                <p>Choose an option to begin</p>
            </div>
        </div>
        <div class="buttons">
            <button id="rock"><img src="images/rock.png"></button>
            <button id="paper"><img src="images/paper.png"></button>
            <button id="scissors"><img src="images/scissors.png"></button>
        </div>
    </div>

    <footer>
        <div class="footer-border">
            <div class="footer-sec">
                <div class="text">
                    <ul>
                        <li></li>
                        <li>Euphorxx © 2026</li>
                        <li id="credits">Credits</li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
